<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Panchangam - On the go</title>

<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .box { border: 1px solid #ccc; padding: 15px; margin-top: 10px; }

  #langSwitch button {
  background: #0F766E;
  color: #FFFFFF;
  border: 1px solid #0F766E;
  padding: 6px 10px;
  margin: 2px;
  border-radius: 6px;
  cursor: pointer;
}

#langSwitch button:hover {
  background: #115E59;
}
#langSwitch {
  position: sticky;
  top: 0;
  z-index: 999;
  background: white;
  padding: 8px 0;
}
#langSwitch button.active {
  background: #FFFFFF;
  color: #0F766E;
  border: 2px solid #FACC15;
  font-weight: bold;
  transform: scale(1.05);
  box-shadow: 0 0 6px rgba(250, 204, 21, 0.35);
}
</style>
</head>

<body>

<h2>!!! Panchangam NOW U001!!!</h2>


<div id="nowTime" style="margin-bottom:8px;"></div>
<div id="version" style="font-size:12px;color:gray;margin-bottom:8px;"></div>
<div id="langSwitch">
<button data-lang="en">ENGLISH</button>
<button data-lang="sa">SANSKRIT</button>
<button data-lang="ta">TAMIL</button>
<button data-lang="te">TELUGU</button>
<button data-lang="ka">KANNADA</button>
</div> <div id="sowramanamExtras" class="box" style="background:#f5faff;"></div>
<div id="thithiExtras" class="box" style="background:#fafafa;"></div>
