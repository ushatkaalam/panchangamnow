<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Panchangam - On the go</title>

<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  .box { border: 1px solid #ccc; padding: 15px; margin-top: 10px; }

  #langSwitch button {
    padding: 6px 10px;
    margin: 2px;
    border: 1px solid #aaa;
    background: #fff;
    cursor: pointer;
  }

  #langSwitch button.active {
    background: #333;
    color: #fff;
  }
</style>
</head>

<body>

<h2>!!! Panchangam NOW UD011!!!</h2>


<div id="nowTime" style="margin-bottom:8px;"></div>
<div id="version" style="font-size:12px;color:gray;margin-bottom:8px;"></div>
<div id="sowramanamExtras" class="box" style="background:#f5faff;"></div>
<div id="thithiExtras" class="box" style="background:#fafafa;"></div>
<div id="thithiBlock" class="box"></div>
<div id="nakshatramBlock" class="box"></div>
<div id="yogamBlock" class="box"></div>
<div id="karanamBlock" class="box"></div>
<div id="pakshamDegreesBlock" class="box">
  <b>P A K S H A M&nbsp;&nbsp;&nbsp;P R O G R E S S</b><br><br>
  <canvas id="pakshamDegreesPie" width="500" height="480"></canvas>
</div>
<div id="langSwitch">
  <button data-lang="en">ENGLISH</button>
<button data-lang="sa">SANSKRIT</button>
<button data-lang="ta">TAMIL</button>
<button data-lang="te">TELUGU</button>
<button data-lang="ka">KANNADA</button>
</div> 
<hr>

<h2>Detailed Tables</h2>

<div id="thithiTableBox"></div>
<br>

<div id="nakshatramTableBox"></div>
<br>

<div id="yogamTableBox"></div>
<br>

<div id="karanamTableBox"></div>

<script src="script.js?v=0"></script>

</body>
</html>
